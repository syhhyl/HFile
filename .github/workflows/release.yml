name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: linux-amd64
            os: ubuntu-24.04
            archive: hf-linux-amd64.tar.gz
          - target: darwin-arm64
            os: macos-14
            archive: hf-darwin-arm64.tar.gz
          - target: windows-amd64
            os: windows-latest
            archive: hf-windows-amd64.zip
            exe_name: hf.exe

    steps:
      - name: Checkout source
        uses: actions/checkout@v5

      - name: Set up MSVC
        if: runner.os == 'Windows'
        uses: ilammy/msvc-dev-cmd@v1

      - name: Build
        shell: bash
        run: bash ./build-nob.sh

      - name: Package archive
        shell: bash
        run: |
          mkdir -p dist
          if [ "${{ runner.os }}" = "Windows" ]; then
            exe_name="${{ matrix.exe_name }}"
            cp "build/${exe_name}" "dist/${exe_name}"
            powershell -Command "Compress-Archive -Path 'dist/${exe_name}' -DestinationPath 'dist/${{ matrix.archive }}'"
            rm -f "dist/${exe_name}"
          else
            tar -czf "dist/${{ matrix.archive }}" -C build hf
          fi

      - name: Upload archive artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.target }}
          path: dist/${{ matrix.archive }}
          if-no-files-found: error

  release:
    name: Create release
    runs-on: ubuntu-24.04
    needs: build

    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Generate checksums
        shell: bash
        run: |
          cd dist
          sha256sum hf-* > checksums.txt

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          make_latest: true
          files: |
            dist/hf-darwin-arm64.tar.gz
            dist/hf-linux-amd64.tar.gz
            dist/hf-windows-amd64.zip
            dist/checksums.txt
